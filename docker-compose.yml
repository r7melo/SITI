services:
  database:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "siti"
    ports:
      - "3307:3306"
    volumes:
      - ./apps/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: 
      context: ./apps/api
    container_name: api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USER=root
      - DB_PASSWORD=root
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/siti?allowPublicKeyRetrieval=true&useSSL=false

  webui:
    build:
      context: ./apps/web
    container_name: webui
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8080
    stdin_open: true
    tty: true

volumes:
  mysql_data: